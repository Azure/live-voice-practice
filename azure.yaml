name: voicelab-sales-training
metadata:
  template: azd-init@1.18.1
infra:
  provider: bicep
  path: infra
  module: main
hooks:
  preprovision:
    posix:
      shell: sh
      run: ./scripts/preProvision.sh
    windows:
      shell: pwsh
      run: ./scripts/preProvision.ps1
  postprovision:
    posix:
      shell: bash
      run: ./scripts/postProvision.sh
    windows:
      shell: pwsh
      run: ./scripts/postProvision.ps1
services:
  voicelab:
    project: .
    host: containerapp
    language: python
    docker:
      path: Dockerfile
      context: .
resources:
  voicelab:
    type: host.containerapp
    port: 8000


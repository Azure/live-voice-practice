name: voicelab-sales-training
metadata:
  template: azd-init@1.18.1
infra:
  provider: bicep
  path: infra
  module: main
hooks:
  preprovision:
    posix:
      shell: sh
      run: ./scripts/preProvision.sh
      interactive: true
    windows:
      shell: pwsh
      run: ./scripts/preProvision.ps1
      interactive: true
  postprovision:
    posix:
      shell: bash
      run: ./scripts/postProvision.sh
      interactive: true
    windows:
      shell: pwsh
      run: ./scripts/postProvision.ps1
      interactive: true
  predeploy:
    posix:
      run: scripts/deploy.sh
      interactive: true
    windows:
      run: scripts/deploy.ps1
      interactive: true
  postdeploy:
    posix:
      shell: sh
      run: scripts/postDeploy.sh
      interactive: true
    windows:
      shell: pwsh
      run: scripts/postDeploy.ps1
      interactive: true

